<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Independent Dynamics</title>
  <!-- Importa o CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo no canto superior esquerdo -->
  <img src="imagem.jpeg" alt="Independent Dynamics" class="logo">

  <!-- Selo central -->
  <div class="overlay">
    <h1>Independent Dynamics</h1>
  </div>

  <!-- Área de conteúdo -->
  <div class="content">
    <h2>Simulador de Braço Robótico</h2>
    <canvas id="armCanvas" width="600" height="400"></canvas>

    <div class="controls">
      <div class="slider-group">
        <label>Ângulo Link 1: <span id="angle1Val">75</span>°</label><br>
        <input type="range" id="angle1" min="-90" max="90" value="75">
      </div>
      <div class="slider-group">
        <label>Ângulo Link 2: <span id="angle2Val">-56</span>°</label><br>
        <input type="range" id="angle2" min="-180" max="180" value="-56">
      </div>
      <div class="slider-group">
        <label>Ângulo Efetor Final: <span id="angle3Val">0</span>°</label><br>
        <input type="range" id="angle3" min="-180" max="180" value="0">
      </div>
      <button id="resetBtn">Resetar Posição</button>
      <button id="animateBtn">Animar</button>
    </div>
  </div>

  <!-- Importa o JavaScript -->
  <script src="script.js"></script>
</body>
</html>
