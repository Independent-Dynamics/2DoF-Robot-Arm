<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulador Braço Robótico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <img src="img/logo.png" alt="Independent Dynamics" class="logo">
  <h1>Simulador de Braço Robótico</h1>
  <canvas id="armCanvas" width="600" height="400"></canvas>

  <div class="controls">
    <div class="slider-group">
      <label>Ângulo Link 1: <span id="angle1Val">75</span>°</label><br>
      <input type="range" id="angle1" min="-90" max="90" value="75">
    </div>
    <div class="slider-group">
      <label>Ângulo Link 2: <span id="angle2Val">-56</span>°</label><br>
      <input type="range" id="angle2" min="-180" max="180" value="-56">
    </div>
    <div class="slider-group">
      <label>Ângulo Efetor Final: <span id="angle3Val">0</span>°</label><br>
      <input type="range" id="angle3" min="-180" max="180" value="0">
    </div>
    <button id="resetBtn">Resetar Posição</button>
    <button id="animateBtn">Animar</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
